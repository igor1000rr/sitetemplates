name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  # ─── Тесты: гейт перед деплоем ───
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: testing
          POSTGRES_PASSWORD: testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testing"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: testing
      DB_USERNAME: testing
      DB_PASSWORD: testing
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, pgsql, mbstring, bcmath, intl, gd, zip
          coverage: none

      - name: Install dependencies
        working-directory: api
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare env
        working-directory: api
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        working-directory: api
        run: vendor/bin/phpunit

  # ─── Деплой (только если тесты прошли) ───
  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 12m
          script: |
            set -e
            cd /opt/sitetemplates

            echo ">>> Pull"
            git pull origin main

            echo ">>> Sync compose"
            cp deploy/docker-compose.prod.yml docker-compose.yml

            echo ">>> Build"
            docker compose build

            echo ">>> Deploy"
            docker compose up -d

            echo ">>> Migrate"
            docker compose exec -T api php artisan migrate --force

            echo ">>> Cache"
            docker compose exec -T api php artisan config:cache
            docker compose exec -T api php artisan view:cache

            echo ">>> Health check (ждём 25 сек)"
            sleep 25

            if docker compose exec -T api curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "✅ API OK"
            else
              echo "❌ API failed"
              docker compose logs api --tail=15
              exit 1
            fi

            for i in 1 2 3; do
              if docker compose exec -T web curl -sf --max-time 5 http://localhost:3000/ > /dev/null 2>&1; then
                echo "✅ Web OK"
                break
              fi
              echo "⏳ Web не готов, попытка $i/3..."
              sleep 10
            done

            RUNNING=$(docker compose ps --status running --format "table" | tail -n +2 | wc -l)
            echo "Running containers: $RUNNING"
            if [ "$RUNNING" -lt 4 ]; then
              echo "❌ Not all containers running"
              docker compose ps
              exit 1
            fi

            echo "✅ Deploy successful at $(date)"
