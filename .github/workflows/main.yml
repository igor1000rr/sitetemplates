name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  # ─── Тесты: гейт перед деплоем ───
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: testing
          POSTGRES_PASSWORD: testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testing"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: testing
      DB_USERNAME: testing
      DB_PASSWORD: testing
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, pgsql, mbstring, bcmath, intl, gd, zip
          coverage: none

      - name: Install dependencies
        working-directory: api
        run: |
          # Не блокируем установку из-за security-advisory: приложение уже работает
          # на этих версиях в проде; апгрейд зависимостей — отдельная задача.
          composer config --no-plugins policy.advisories.block false || true
          # --no-scripts: package:discover запустится позже, после создания каталогов
          # кэша (как в prod Dockerfile), иначе artisan падает с "valid cache path"
          composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: Prepare app
        working-directory: api
        run: |
          mkdir -p bootstrap/cache storage/framework/cache storage/framework/sessions storage/framework/views storage/logs
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        working-directory: api
        run: vendor/bin/phpunit

  # ─── Деплой (только если тесты прошли) ───
  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 12m
          envs: REDIS_PASSWORD
          script: |
            set -e
            # REDIS_PASSWORD прокидываем из GitHub secret, чтобы docker compose
            # не зависел от наличия переменной в server .env
            export REDIS_PASSWORD="$REDIS_PASSWORD"
            cd /opt/sitetemplates

            echo ">>> Pull"
            git pull origin main

            echo ">>> Sync compose"
            cp deploy/docker-compose.prod.yml docker-compose.yml

            echo ">>> Build"
            docker compose build

            echo ">>> Deploy"
            docker compose up -d
            # nginx читает конфиг и резолвит upstream'ы (api/web) только при старте.
            # После пересоздания api/web их IP меняются → пересоздаём nginx последним,
            # иначе он держит старые адреса и отдаёт 502; заодно подхватит новый nginx.conf.
            docker compose up -d --force-recreate nginx

            echo ">>> Migrate"
            docker compose exec -T api php artisan migrate --force

            echo ">>> Cache"
            docker compose exec -T api php artisan config:cache
            docker compose exec -T api php artisan view:cache

            echo ">>> Health check (ждём 25 сек)"
            sleep 25

            if docker compose exec -T api curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "✅ API OK"
            else
              echo "❌ API failed"
              docker compose logs api --tail=15
              exit 1
            fi

            for i in 1 2 3; do
              if docker compose exec -T web curl -sf --max-time 5 http://localhost:3000/ > /dev/null 2>&1; then
                echo "✅ Web OK"
                break
              fi
              echo "⏳ Web не готов, попытка $i/3..."
              sleep 10
            done

            RUNNING=$(docker compose ps --status running --format "table" | tail -n +2 | wc -l)
            echo "Running containers: $RUNNING"
            if [ "$RUNNING" -lt 4 ]; then
              echo "❌ Not all containers running"
              docker compose ps
              exit 1
            fi

            echo ">>> TLS: проверка серта + выпуск/продление при необходимости"
            # certbot renew не помогает, если на сервере нет renewal-конфига (состояние
            # LE потеряно). Поэтому проверяем РЕАЛЬНЫЙ серт из deploy/ssl и при истечении
            # выпускаем заново через certonly --standalone (создаёт и renewal-конфиг).
            # renewal-hooks нужны, чтобы systemd-таймер certbot потом продлевал без 502.
            if ! command -v certbot >/dev/null 2>&1; then
              apt-get update -qq && apt-get install -y -qq certbot || true
            fi
            mkdir -p /etc/letsencrypt/renewal-hooks/pre /etc/letsencrypt/renewal-hooks/post
            printf '#!/bin/sh\ncd /opt/sitetemplates && docker compose stop nginx\n' > /etc/letsencrypt/renewal-hooks/pre/stop-nginx.sh
            printf '#!/bin/sh\ncd /opt/sitetemplates && cp /etc/letsencrypt/live/aitempl.ru/*.pem deploy/ssl/ 2>/dev/null || true; docker compose up -d nginx\n' > /etc/letsencrypt/renewal-hooks/post/start-nginx.sh
            chmod +x /etc/letsencrypt/renewal-hooks/pre/stop-nginx.sh /etc/letsencrypt/renewal-hooks/post/start-nginx.sh
            # Выпуск только если серта нет или истекает в ближайшие 7 дней (иначе no-op без даунтайма).
            if ! openssl x509 -checkend 604800 -noout -in deploy/ssl/fullchain.pem >/dev/null 2>&1; then
              echo ">>> Серт истёк/скоро истечёт — выпускаю заново (освобождаю :80 от nginx)"
              docker compose stop nginx || true
              if certbot certonly --standalone --non-interactive --agree-tos \
                   --email admin@aitempl.ru -d aitempl.ru -d www.aitempl.ru --force-renewal; then
                cp /etc/letsencrypt/live/aitempl.ru/fullchain.pem deploy/ssl/ || true
                cp /etc/letsencrypt/live/aitempl.ru/privkey.pem deploy/ssl/ || true
                echo "✅ TLS-сертификат выпущен"
              else
                echo "⚠️  Выпуск TLS не удался — проверить вручную"
              fi
              docker compose up -d nginx || true
            else
              echo "✅ TLS-сертификат ещё действителен (>7 дней) — пропускаю"
            fi

            echo ">>> S3 diag (временно)"
            docker compose exec -T api php artisan diag:s3 2>&1 || true

            echo "✅ Deploy successful at $(date)"
