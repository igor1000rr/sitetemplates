name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 147.45.155.40
          username: root
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 12m
          script: |
            set -e
            cd /opt/sitetemplates

            echo ">>> Update remote"
            git remote set-url origin https://igor1000rr:${{ secrets.GIT_TOKEN }}@github.com/igor1000rr/sitetemplates.git

            echo ">>> Pull"
            git pull origin main

            echo ">>> Sync compose"
            cp deploy/docker-compose.prod.yml docker-compose.yml

            echo ">>> Build"
            docker compose build --no-cache

            echo ">>> Deploy"
            docker compose up -d

            echo ">>> Migrate"
            docker compose exec -T api php artisan migrate --force

            echo ">>> Health check (ждём 25 сек)"
            sleep 25

            if docker compose exec -T api curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "✅ API OK"
            else
              echo "❌ API failed"
              docker compose logs api --tail=15
              exit 1
            fi

            for i in 1 2 3; do
              if docker compose exec -T web curl -sf --max-time 5 http://localhost:3000/ > /dev/null 2>&1; then
                echo "✅ Web OK"
                break
              fi
              echo "⏳ Web не готов, попытка $i/3..."
              sleep 10
            done

            RUNNING=$(docker compose ps --status running --format "table" | tail -n +2 | wc -l)
            echo "Running containers: $RUNNING"
            if [ "$RUNNING" -lt 4 ]; then
              echo "❌ Not all containers running"
              docker compose ps
              exit 1
            fi

            echo "✅ Deploy successful at $(date)"
